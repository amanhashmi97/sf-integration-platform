<template>
    <lightning-card>
        <div slot="title">
            <lightning-icon icon-name="utility:einstein" 
                size="small" 
                class="slds-m-right_x-small">
            </lightning-icon>
            AI Application Summary
        </div>

        <div slot="actions">
            <lightning-button
                label="Refresh"
                icon-name="utility:refresh"
                onclick={generateSummary}
                disabled={isLoading}>
            </lightning-button>
        </div>

        <div class="slds-p-around_medium">

            <template lwc:if={isLoading}>
                <div class="loading-container">
                    <lightning-spinner 
                        alternative-text="Generating AI summary..." 
                        size="small">
                    </lightning-spinner>
                    <p class="loading-text">Analyzing application data...</p>
                </div>
            </template>

            <template lwc:if={summary}>
                <div class="summary-container">
                    <div class="ai-badge">
                        <lightning-icon 
                            icon-name="utility:einstein" 
                            size="xx-small"
                            class="slds-m-right_xx-small">
                        </lightning-icon>
                        Generated by Claude AI
                    </div>
                    <p class="summary-text">{summary}</p>
                    <p class="generated-time">Last generated: {generatedTime}</p>
                </div>
            </template>

            <template lwc:if={error}>
                <div class="error-container">
                    <lightning-icon 
                        icon-name="utility:error" 
                        variant="error" 
                        size="small"
                        class="slds-m-right_x-small">
                    </lightning-icon>
                    <p class="error-text">{error}</p>
                    <lightning-button 
                        label="Try Again" 
                        onclick={generateSummary}
                        variant="neutral"
                        class="slds-m-top_small">
                    </lightning-button>
                </div>
            </template>

            <template lwc:if={showEmpty}>
                <div class="empty-container">
                    <p class="empty-text">Click refresh to generate an AI summary.</p>
                </div>
            </template>

        </div>
    </lightning-card>
</template>
